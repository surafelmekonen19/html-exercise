<h1 align="center">Creator's Signup Form</h1>
<form  class=form action="signup_process.js" method="post">
   
    <label for="fname" required >Full Name:</label><br>
    <input type="text" id="fname" placeholder="visual studio" name="fname" required><br><br>
    
    <label for="phone-number" required>Phone Number:</label><br>
    <input type="tel" id="phone-number" placeholder="09-12-34-56-78" name="phone-number"
    pattern="[0][9]{2}-[0-9]{2}-[0-9]{2}-[0-9]{2}-[0-9]{2}" required><br><br>

    <label for="email">Email Address:</label><br>
    <input type="email" id="email" name="email"  placeholder="example@domain.com" required><br><br>
    
    <label for="password" required>Password:</label><br>
    <input type="password" id="password" name="password" placeholder="This_is_mypassword" required><br><br>
    
    <label for="file">Upload Profile Picture:</label><br>
    <input type="file" id="file" name="file" accept="image/png,image/jpeg" required><br><br>
   
    <label for="payment" id="pm">Payment Method</label><br>
    <select id="payment" placeholder="payment plan" required>
            <option value="telebirr">Telebirr</option>
            <option value="cbe-birr">Cbe-birr</option>
            <option value="bank-transfer">Bank Transfer</option>
    </select>
    <br><br><button type="submit" id="sbtn" >Sign Up</button>
</form>
<style>
    .form{
        margin-left:25%;
        margin-top:10px;
        color:darkred;
    }
    #payment{
        width:400px;
        height:35px;
    }
    input,select{
