<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Website</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="logo">MySite</div>

    <nav class="main-nav">
      <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#services">Services</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- SECTIONS -->
  <main>
    <section id="home">
      <h1>Welcome</h1>
      <p>This is the home section.</p>
    </section>

    <section id="about">
      <h1>About Us</h1>
      <p>About section content.</p>
    </section>

    <section id="services">
      <h1>Our Services</h1>
      <p>Services section content.</p>
    </section>

    <section id="contact">
      <h1>Contact</h1>
      <p>Contact section content.</p>
    </section>
  </main>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
}

/* Header */
.site-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 40px;
  background-color: #222;
  position: sticky;
  top: 0;
}

.logo {
  color: white;
  font-size: 24px;
  font-weight: bold;
}

/* Navigation */
.main-nav ul {
  display: flex;
  list-style: none;
  gap: 20px;
}

.main-nav a {
  color: white;
  text-decoration: none;
}

.main-nav a:hover {
  text-decoration: underline;
} 

/* Sections */
section {
  padding: 100px 40px;
  min-height: 100vh;
}
</style>
</body>
</html>
